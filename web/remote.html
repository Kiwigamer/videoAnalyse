<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PiStation Fernbedienung</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="remote-body">

  <header class="remote-header">
    <span class="logo">🎬 PiStation</span>
    <nav class="tab-nav">
      <button class="tab-btn active" data-tab="control">Steuerung</button>
      <button class="tab-btn"        data-tab="videos">Videos</button>
    </nav>
  </header>

  <!-- ═══════════════════ TAB: STEUERUNG ═══════════════════ -->
  <section id="tab-control" class="tab-content active">

    <!-- Status-Zeile -->
    <div class="status-bar">
      <span id="r-filename" class="r-filename">Kein Video</span>
      <span id="r-time"     class="r-time">—</span>
    </div>

    <!-- Timeline Slider -->
    <div class="slider-container">
      <input type="range" id="seekSlider" min="0" max="100" value="0" step="0.1" />
      <div class="slider-labels">
        <span id="r-pos">00:00</span>
        <span id="r-percent">0%</span>
        <span id="r-dur">00:00</span>
      </div>
    </div>

    <!-- Sprung-Buttons -->
    <div class="btn-row">
      <button class="ctrl-btn" onclick="sendControl('seek', -60)">⏮ 60s</button>
      <button class="ctrl-btn" onclick="sendControl('seek', -10)">⏪ 10s</button>
      <button class="ctrl-btn" onclick="sendControl('seek', -5)">⏪ 5s</button>
    </div>

    <!-- Play / Pause -->
    <div class="btn-row center">
      <button class="ctrl-btn play-btn" id="playPauseBtn" onclick="sendControl('toggle_pause')">⏸ Pause</button>
    </div>

    <div class="btn-row">
      <button class="ctrl-btn" onclick="sendControl('seek', 5)">5s ⏩</button>
      <button class="ctrl-btn" onclick="sendControl('seek', 10)">10s ⏩</button>
      <button class="ctrl-btn" onclick="sendControl('seek', 60)">60s ⏭</button>
    </div>

    <!-- Geschwindigkeit -->
    <div class="section-label">Geschwindigkeit</div>
    <div class="btn-row speed-row">
      <button class="ctrl-btn speed-btn" onclick="sendControl('set_speed', 0.25)">0.25x</button>
      <button class="ctrl-btn speed-btn" onclick="sendControl('set_speed', 0.5)">0.5x</button>
      <button class="ctrl-btn speed-btn active-speed" id="speed-1" onclick="sendControl('set_speed', 1.0)">1x</button>
      <button class="ctrl-btn speed-btn" onclick="sendControl('set_speed', 1.5)">1.5x</button>
      <button class="ctrl-btn speed-btn" onclick="sendControl('set_speed', 2.0)">2x</button>
    </div>

    <!-- Lautstärke -->
    <div class="section-label">Lautstärke: <strong id="volumeDisplay">100</strong></div>
    <div class="slider-container">
      <input type="range" id="volumeSlider" min="0" max="100" value="100" step="1" />
    </div>

    <!-- Stop -->
    <div class="btn-row center" style="margin-top: 1rem;">
      <button class="ctrl-btn stop-btn" onclick="sendControl('stop')">⏹ Stop</button>
    </div>

  </section>

  <!-- ═══════════════════ TAB: VIDEOS ═══════════════════ -->
  <section id="tab-videos" class="tab-content">

    <!-- Upload -->
    <div class="upload-area">
      <label class="upload-label" for="fileInput">
        📂 Video hochladen
        <input type="file" id="fileInput" accept=".mp4,.mkv,.avi,.mov,.webm" hidden />
      </label>
      <div id="uploadProgress" class="upload-progress hidden">
        <div class="upload-bar-outer">
          <div class="upload-bar-inner" id="uploadBar"></div>
        </div>
        <span id="uploadPercent">0%</span>
      </div>
      <div id="uploadStatus" class="upload-status"></div>
    </div>

    <!-- Video-Liste -->
    <div class="section-label">Vorhandene Videos</div>
    <div id="videoList" class="video-list">
      <div class="loading">Lade…</div>
    </div>

  </section>

  <script src="/static/socket.io.min.js"></script>
  <script src="/static/remote.js"></script>
</body>
</html>
